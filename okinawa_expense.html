<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖繩記帳｜MSC 榮耀號</title>
<style>
  :root {
    --bg: #F2FCFB;
    --surface: #E8F9F8;
    --surface2: #C8F0EE;
    --accent: #0ABFB8;
    --accent2: #086E6A;
    --text: #0A3230;
    --text-muted: #2A7A76;
    --border: #A0E4E0;
    --success: #0ABFB8;
    --radius: 14px;
    --font: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 1.063rem; min-height: 100vh; padding-bottom: 100px; }
  .page-wrap { max-width: 600px; margin: 0 auto; }

  /* Header */
  .header { background: linear-gradient(135deg, #E8F9F8 0%, #C8F0EE 50%, #A0E4E0 100%); padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
  .back-btn { position: absolute; top: 50%; left: 16px; transform: translateY(-50%); display: flex; align-items: center; gap: 5px; color: #086E6A; font-size: 0.938rem; font-weight: 600; text-decoration: none; padding: 6px 10px; border-radius: 20px; background: rgba(10,191,184,0.1); transition: background 0.15s; }
  .back-btn:hover { background: rgba(10,191,184,0.2); }
  .header-eyebrow { font-size: 0.875rem; color: #086E6A; letter-spacing: 0.12em; font-weight: 500; margin-bottom: 6px; }
  .header h1 { font-size: 1.5rem; font-weight: 700; color: #0A3230; }
  .header-sub { font-size: 0.875rem; color: #0ABFB8; margin-top: 4px; }

  /* Tabs */
  .tabs-outer { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .tabs { display: flex; max-width: 600px; margin: 0 auto; }
  .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 0.938rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font); transition: color 0.2s, border-color 0.2s; }
  .tab.active { color: #0A3230; border-bottom-color: #0ABFB8; }

  .panel { display: none; padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .panel.active { display: block; }

  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); }
  .card-title { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.08em; margin-bottom: 14px; }
  .section-label { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.1em; margin: 24px 0 10px; padding-left: 2px; }

  /* Summary stats */
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--surface); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-num { font-size: 1.625rem; font-weight: 700; color: var(--accent2); line-height: 1.1; }
  .stat-unit { font-size: 0.875rem; color: var(--text-muted); }
  .stat-desc { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }

  /* Donut */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .legend-item { display: grid; grid-template-columns: 14px 3.2rem 5rem 2.8rem; align-items: center; gap: 6px; font-size: 0.875rem; margin-bottom: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { color: var(--text-muted); }
  .legend-amt { color: #086E6A; font-weight: 600; font-size: 0.813rem; text-align: right; }
  .legend-val { color: var(--text); font-weight: 700; text-align: right; }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 0.875rem; color: var(--text-muted); width: 80px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 6px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; min-width: 2px; }
  .bar-amt { font-size: 0.875rem; color: var(--text-muted); width: 88px; flex-shrink: 0; text-align: right; }

  /* ── Daily accordion ── */
  .day-accordion { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

  /* Summary card (collapsed) */
  .day-summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .day-summary:hover { background: rgba(242,252,251,0.95); }
  .day-summary-left { display: flex; align-items: center; gap: 12px; }
  .day-badge {
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.813rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .day-summary-info { }
  .day-summary-name { font-size: 0.938rem; font-weight: 600; }
  .day-summary-sub { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }
  .day-summary-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .day-summary-total { text-align: right; }
  .day-summary-amount { font-size: 1.063rem; font-weight: 700; color: var(--accent2); }
  .day-summary-count { font-size: 0.813rem; color: var(--text-muted); margin-top: 2px; }
  .day-chevron { color: var(--text-muted); font-size: 0.875rem; transition: transform 0.25s; }
  .day-accordion.open .day-chevron { transform: rotate(180deg); }

  /* Expanded content */
  .day-detail {
    display: none;
    background: var(--surface2);
    padding: 14px 16px;
    border-top: 1px solid var(--border);
  }
  .day-accordion.open .day-detail { display: block; }

  /* Mini category bars inside day detail */
  .mini-cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mini-cat-label { font-size: 0.875rem; color: var(--text-muted); min-width: 4rem; flex-shrink: 0; white-space: nowrap; }
  .mini-bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 8px; }
  .mini-bar-fill { height: 100%; border-radius: 4px; }
  .mini-cat-amt { font-size: 0.875rem; color: var(--text-muted); min-width: 5rem; text-align: right; flex-shrink: 0; white-space: nowrap; }

  /* Record rows inside expanded */
  .detail-record { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
  .detail-icon { width: 34px; height: 34px; background: var(--surface); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; flex-shrink: 0; }
  .detail-main { flex: 1; min-width: 0; }
  .detail-desc { font-size: 0.938rem; font-weight: 500; }
  .detail-loc { font-size: 0.875rem; color: var(--text-muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-amt { font-size: 0.938rem; font-weight: 700; color: var(--accent2); flex-shrink: 0; text-align: right; }
  .detail-twd { font-size: 0.813rem; color: var(--text-muted); text-align: right; }

  /* Records tab */
  .record-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .record-item:last-child { border-bottom: none; }
  .record-cat-icon { width: 40px; height: 40px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
  .record-main { flex: 1; min-width: 0; }
  .record-desc { font-size: 1rem; font-weight: 500; }
  .record-meta { font-size: 0.875rem; color: var(--text-muted); margin-top: 2px; }
  .record-amount { font-size: 1.063rem; font-weight: 700; color: var(--accent2); text-align: right; flex-shrink: 0; }
  .record-twd { font-size: 0.813rem; color: var(--text-muted); text-align: right; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 28px; right: 22px;
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #0ABFB8, #5DD8D4);
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 1.75rem;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(10,191,184,0.35), 0 0 0 2px white;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(10,191,184,0.45), 0 0 0 2px white; }
  .fab:active { transform: scale(0.95); }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(4,50,48,0.45);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: rgba(255,252,250,0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 0.5px solid rgba(10,191,184,0.2);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 0 0 36px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
    color: #2A1E1A;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: rgba(10,191,184,0.25); border-radius: 2px; margin: 14px auto 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(10,191,184,0.15); }
  .modal-title { font-size: 1.063rem; font-weight: 700; color: #0A3230; }
  .modal-close { background: rgba(10,191,184,0.12); border: none; color: #2A7A76; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font); }
  .modal-body { padding: 18px 20px 0; }

  /* Modal steps */
  .modal-step { display: none; }
  .modal-step.active { display: block; }

  /* Upload inside modal */
  .upload-area {
    border: 2px dashed rgba(10,191,184,0.35); border-radius: var(--radius);
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative; margin-bottom: 16px;
  }
  .upload-area:hover { border-color: #0ABFB8; background: rgba(10,191,184,0.05); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 2.375rem; margin-bottom: 8px; }
  .upload-text { font-size: 1.063rem; font-weight: 600; margin-bottom: 4px; }
  .upload-hint { font-size: 0.875rem; color: #7A6258; }

  .preview-wrap { display: none; margin-bottom: 14px; position: relative; }
  .preview-wrap img { width: 100%; border-radius: 10px; max-height: 200px; object-fit: contain; background: #000; }
  .preview-clear { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 0.938rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font); }

  .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #0ABFB8, #5DD8D4); color: #fff; border: none; border-radius: var(--radius); font-size: 1.063rem; font-weight: 700; font-family: var(--font); cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary { width: 100%; padding: 13px; background: transparent; color: #2A7A76; border: 1px solid rgba(10,191,184,0.3); border-radius: var(--radius); font-size: 1rem; font-family: var(--font); cursor: pointer; }
  .btn-save { width: 100%; padding: 15px; background: #0ABFB8; color: #fff; border: none; border-radius: var(--radius); font-size: 1.063rem; font-weight: 700; font-family: var(--font); cursor: pointer; margin-bottom: 10px; }

  /* Form */
  .form-group { margin-bottom: 13px; }
  .form-label { display: block; font-size: 0.875rem; color: #2A7A76; margin-bottom: 5px; font-weight: 500; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.8); border: 1px solid rgba(10,191,184,0.25); border-radius: 10px; color: #0A3230; font-size: 1rem; font-family: var(--font); appearance: none; -webkit-appearance: none; outline: none; }
  .form-input:focus, .form-select:focus { border-color: #0ABFB8; }
  .currency-row { display: flex; gap: 8px; }
  .currency-row .form-input { flex: 1; }
  .currency-btn { padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(10,191,184,0.25); background: rgba(255,255,255,0.8); color: #2A7A76; font-size: 0.875rem; font-family: var(--font); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .currency-btn.active { background: linear-gradient(135deg, #0ABFB8, #5DD8D4); color: #fff; border-color: #0ABFB8; }
  .category-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; }
  .cat-btn { padding: 9px 4px; border-radius: 10px; border: 1px solid rgba(10,191,184,0.25); background: rgba(255,255,255,0.8); color: #2A7A76; font-size: 0.813rem; min-height: 60px; font-family: var(--font); cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.15s; }
  .cat-btn .ci { font-size: 1.25rem; }
  .cat-btn.active { background: rgba(10,191,184,0.12); border-color: #0ABFB8; color: #086E6A; }

  /* Loading overlay */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(232,249,248,0.92); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 50px; height: 50px; border: 4px solid rgba(10,191,184,0.2); border-top-color: #0ABFB8; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 1.063rem; color: #086E6A; }

  /* Toast */
  .toast { position: fixed; bottom: 108px; left: 50%; transform: translateX(-50%) translateY(60px); background: #0ABFB8; color: #fff; padding: 13px 26px; border-radius: 50px; font-size: 0.938rem; font-weight: 600; z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #e53935; }

  select option { background: rgba(242,252,251,0.95); }
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="https://zeisshong.github.io/okinawa/">← 行程表</a>
  <div class="header-eyebrow">🚢 MSC 榮耀號 · 沖繩郵輪之旅</div>
  <h1>旅遊記帳</h1>
  <div class="header-sub">6/30 – 7/4 · 四人同行</div>
</div>

<div class="tabs-outer"><div class="tabs">
  <button class="tab active" onclick="switchTab('stats',this)">📊 統計</button>
  <button class="tab" onclick="switchTab('records',this)">📋 明細</button>
</div></div>

<!-- ══ 統計 Panel ══ -->
<div class="panel active" id="panel-stats">

  <!-- 整趟摘要 -->
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-unit">TWD</div>
      <div class="stat-desc">整趟總花費</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statPP">—</div>
      <div class="stat-unit">TWD／人</div>
      <div class="stat-desc">人均</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">類別比例</div>
    <div class="donut-wrap">
      <svg id="donutSvg" width="120" height="120" viewBox="0 0 120 120"></svg>
      <div class="legend" id="catLegend"></div>
    </div>
    <div style="height:0.5px;background:var(--border);margin:12px 0"></div>
    <div class="card-title">幣別結構</div>
    <div class="bar-chart" id="curBars"></div>
  </div>

  <div class="card" id="highlightCard" style="display:none">
    <div class="card-title">旅遊亮點</div>
    <div id="highlightContent"></div>
  </div>

  <!-- 每日統計 accordion -->
  <div class="section-label">每日統計</div>
  <div id="dayAccordions"></div>

</div>

<!-- ══ 明細 Panel ══ -->
<div class="panel" id="panel-records">
  <div id="recordsList"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="新增記帳">＋</button>

<!-- ══ Modal ══ -->
<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">📸 上傳收據</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- Step 1: Upload -->
      <div class="modal-step active" id="step1">
        <div class="upload-area" id="uploadArea">
          <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this)">
          <div class="upload-icon">📷</div>
          <div class="upload-text">選擇照片</div>
          <div class="upload-hint">從相簿選取已拍好的收據</div>
        </div>
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" src="" alt="預覽">
          <button class="preview-clear" onclick="clearFile()">✕</button>
        </div>
        <button class="btn-primary" id="btnAnalyze" onclick="analyzeReceipt()" disabled>🔍 解析收據</button>
        <button class="btn-secondary" onclick="closeModal()">取消</button>
      </div>

      <!-- Step 2: Confirm form -->
      <div class="modal-step" id="step2">
        <div class="form-group">
          <label class="form-label">地點／店名</label>
          <input class="form-input" id="fLocation" type="text" placeholder="例：美麗海水族館">
        </div>
        <div class="form-group">
          <label class="form-label">說明</label>
          <input class="form-input" id="fDescription" type="text" placeholder="例：午餐、門票">
        </div>
        <div class="form-group">
          <label class="form-label">金額</label>
          <div class="currency-row">
            <input class="form-input" id="fAmount" type="number" placeholder="0" inputmode="decimal" oninput="checkTaxRefund(this.value)">
            <button class="currency-btn active" id="btnJPY" onclick="setCurrency('JPY')">¥ JPY</button>
            <button class="currency-btn" id="btnTWD" onclick="setCurrency('TWD')">$ TWD</button>
          </div>
          <div id="taxHint" style="display:none;margin-top:6px;padding:7px 12px 7px 14px;background:#FFD87A;border-radius:8px;font-size:0.875rem;color:#6A3E00;border-left:3px solid #E09000;font-weight:500">
            🧾 單筆超過 ¥5,000，記得向店家申請退稅！
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">類別</label>
          <div class="category-grid" style="grid-template-columns:repeat(4,1fr)">
            <button class="cat-btn active" data-cat="餐飲" onclick="setCategory(this)"><span class="ci">🍜</span>餐飲</button>
            <button class="cat-btn" data-cat="交通" onclick="setCategory(this)"><span class="ci">🚕</span>交通</button>
            <button class="cat-btn" data-cat="購物" onclick="setCategory(this)"><span class="ci">🛍</span>購物</button>
            <button class="cat-btn" data-cat="觀光" onclick="setCategory(this)"><span class="ci">🎡</span>觀光</button>
            <button class="cat-btn" data-cat="藥妝" onclick="setCategory(this)"><span class="ci">💊</span>藥妝</button>
            <button class="cat-btn" data-cat="甜點" onclick="setCategory(this)"><span class="ci">🍰</span>甜點</button>
            <button class="cat-btn" data-cat="其他" onclick="setCategory(this)"><span class="ci">📦</span>其他</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">日期</label>
          <select class="form-select" id="fDate">
            <option value="6/30">6/30（二）出發日</option>
            <option value="7/01">7/01（三）沖繩</option>
            <option value="7/02">7/02（四）航行日</option>
            <option value="7/03">7/03（五）石垣島</option>
            <option value="7/04">7/04（六）返家</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">品項明細（選填）</label>
          <input class="form-input" id="fItems" type="text" placeholder="例：餅乾×500, 冰淇淋×300">
        </div>
        <div class="form-group">
          <label class="form-label">備註（選填）</label>
          <input class="form-input" id="fNote" type="text" placeholder="">
        </div>
        <button class="btn-save" id="btnSave" onclick="saveRecord()">💾 儲存記帳</button>
        <button class="btn-secondary" onclick="goStep(1)">← 重新上傳</button>
      </div>

    </div>
  </div>
</div>

<!-- Loading -->

<script>
// ── Config ──
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxVMgn9fB0BYPC-9FWh_PS_iQX08GRsKYeH0eRp49-KhGIjqOhSmRgCV5eRT-5aEe57tg/exec';
const JPY_TO_TWD = 0.2;  // ¥1 ≈ NT$0.2
const USD_TO_TWD = 32;   // $1 ≈ NT$32

// ── Data ──
const MOCK = []; // 假資料已清空，實際資料從 GAS 讀取

const DAYS = [
  { val:'6/30', label:'Day 1', desc:'出發日' },
  { val:'7/01', label:'Day 2', desc:'沖繩' },
  { val:'7/02', label:'Day 3', desc:'航行日' },
  { val:'7/03', label:'Day 4', desc:'石垣島' },
  { val:'7/04', label:'Day 5', desc:'返家' },
];
const CATS = [
  { name:'餐飲', color:'#0ABFB8' },
  { name:'交通', color:'#ffb347' },
  { name:'購物', color:'#4caf7d' },
  { name:'觀光', color:'#42a5f5' },
  { name:'藥妝', color:'#f06292' },
  { name:'甜點', color:'#ff8a65' },
  { name:'其他', color:'#ab47bc' },
];
const CAT_ICONS = { '餐飲':'🍜','交通':'🚕','購物':'🛍','觀光':'🎡','藥妝':'💊','甜點':'🍰','其他':'📦' };

function toTWD(a, c) {
  if (c === 'JPY') return a * JPY_TO_TWD;
  if (c === 'USD') return a * USD_TO_TWD;
  return a;
}

// ── Tax refund hint ──
function checkTaxRefund(val) {
  const hint = document.getElementById('taxHint');
  if (hint) hint.style.display = (currentCurrency === 'JPY' && parseFloat(val) >= 5000) ? 'block' : 'none';
}

// ── Highlights ──
function renderHighlights(data) {
  const valid = data.filter(r => r.amount > 0);
  if (!valid.length) return;
  const maxRec = valid.reduce((a, b) => toTWD(b.amount, b.currency) > toTWD(a.amount, a.currency) ? b : a);
  const maxTWD = Math.round(toTWD(maxRec.amount, maxRec.currency));
  const dayTotals = DAYS.map(d => ({
    label: d.val + '（' + d.desc + '）',
    total: valid.filter(r => r.date === d.val).reduce((s, r) => s + toTWD(r.amount, r.currency), 0)
  }));
  const maxDay = dayTotals.reduce((a, b) => b.total > a.total ? b : a);
  const symMap = { JPY:'¥', TWD:'NT$', USD:'US$' };
  const sym = symMap[maxRec.currency] || maxRec.currency;
  document.getElementById('highlightCard').style.display = 'block';
  document.getElementById('highlightContent').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:0">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:0.875rem;color:var(--text-muted);margin-bottom:2px">最大一筆</div>
          <div style="font-size:0.938rem;font-weight:600">${maxRec.desc || maxRec.location}</div>
          <div style="font-size:0.813rem;color:var(--text-muted)">${maxRec.location}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.063rem;font-weight:700;color:#086E6A">${sym}${maxRec.amount.toLocaleString()}</div>
          <div style="font-size:0.813rem;color:var(--text-muted)">≈ NT$${maxTWD.toLocaleString()}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0">
        <div>
          <div style="font-size:0.875rem;color:var(--text-muted);margin-bottom:2px">最花錢的一天</div>
          <div style="font-size:0.938rem;font-weight:600">${maxDay.label}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.063rem;font-weight:700;color:#086E6A">NT$${Math.round(maxDay.total).toLocaleString()}</div>
        </div>
      </div>
    </div>`;
}

// ── Tab ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Stats ──
function renderStats(data) {
  const valid = data.filter(r => r.amount > 0);
  const totalTWD = valid.reduce((s, r) => s + toTWD(r.amount, r.currency), 0);
  document.getElementById('statTotal').textContent = Math.round(totalTWD).toLocaleString();
  document.getElementById('statPP').textContent = Math.round(totalTWD / 4).toLocaleString();

  // Donut
  const catTotals = CATS.map(c => valid.filter(r => r.category === c.name).reduce((s, r) => s + toTWD(r.amount, r.currency), 0));
  renderDonut(catTotals, totalTWD > 0 ? totalTWD : 1);
  renderHighlights(valid);

  // Currency bars
  const jpyAmt = valid.filter(r => r.currency === 'JPY').reduce((s, r) => s + r.amount, 0);
  const twdAmt = valid.filter(r => r.currency === 'TWD').reduce((s, r) => s + r.amount, 0);
  const usdAmt = valid.filter(r => r.currency === 'USD').reduce((s, r) => s + r.amount, 0);
  const allCurs = [
    { label:'日圓 JPY', val:jpyAmt, color:'#0ABFB8', prefix:'¥' },
    { label:'台幣 TWD', val:twdAmt, color:'#42a5f5', prefix:'NT$' },
    { label:'美金 USD', val:usdAmt, color:'#ffb347', prefix:'US$' },
  ].filter(b => b.val > 0);
  const maxC = Math.max(...allCurs.map(b => b.val), 1);
  document.getElementById('curBars').innerHTML = allCurs.map(b => `<div class="bar-row">
    <div class="bar-label">${b.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(b.val/maxC*100)}%;background:${b.color}"></div></div>
    <div class="bar-amt">${b.prefix}${b.val.toLocaleString()}</div>
  </div>`).join('');

  // Daily accordions
  const container = document.getElementById('dayAccordions');
  container.innerHTML = '';
  DAYS.forEach((d, di) => {
    const rows = valid.filter(r => r.date === d.val);
    const dayTotal = rows.reduce((s, r) => s + toTWD(r.amount, r.currency), 0);
    const ac = document.createElement('div');
    ac.className = 'day-accordion';
    ac.id = 'acc-' + di;

    // Summary row
    const summary = document.createElement('div');
    summary.className = 'day-summary';
    summary.innerHTML = `
      <div class="day-summary-left">
        <div class="day-badge">${d.label}</div>
        <div class="day-summary-info">
          <div class="day-summary-name">${d.val}（${d.desc}）</div>
          <div class="day-summary-sub">${rows.length} 筆消費</div>
        </div>
      </div>
      <div class="day-summary-right">
        <div class="day-summary-total">
          <div class="day-summary-amount">${Math.round(dayTotal).toLocaleString()}</div>
          <div class="day-summary-count">TWD</div>
        </div>
        <div class="day-chevron">▼</div>
      </div>`;
    summary.onclick = () => ac.classList.toggle('open');

    // Detail
    const detail = document.createElement('div');
    detail.className = 'day-detail';

    if (rows.length === 0) {
      detail.innerHTML = '<div style="color:var(--text-muted);font-size:0.875rem;padding:8px 0">本日無消費記錄</div>';
    } else {
      // Mini cat bars
      const dayMax = Math.max(...CATS.map(c => rows.filter(r => r.category === c.name).reduce((s, r) => s + toTWD(r.amount, r.currency), 0)), 1);
      const miniBars = CATS.map(c => {
        const amt = rows.filter(r => r.category === c.name).reduce((s, r) => s + toTWD(r.amount, r.currency), 0);
        if (amt === 0) return '';
        return `<div class="mini-cat-row">
          <div class="mini-cat-label">${CAT_ICONS[c.name]} ${c.name}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.round(amt/dayMax*100)}%;background:${c.color}"></div></div>
          <div class="mini-cat-amt">${Math.round(amt).toLocaleString()} TWD</div>

      }).join('');

      // Record rows
      const recRows = rows.map(r => {
        const twd = Math.round(toTWD(r.amount, r.currency));
        return `<div class="detail-record">
          <div class="detail-icon">${CAT_ICONS[r.category] || '📦'}</div>
          <div class="detail-main">
            <div class="detail-desc">${r.desc}</div>
            <div class="detail-loc">${r.location}</div>
          </div>
          <div>
            <div class="detail-amt">${'¥JPY,NT$TWD,US$USD'.split(',').reduce((m,s)=>{const[p,c]=s.split(/(?=[A-Z]{2,})/);return {...m,[c]:p}},{})[r.currency]||'$'}${r.amount.toLocaleString()}</div>

      const taxHint = taxRows.length > 0

        : '';

    ac.appendChild(summary);
    ac.appendChild(detail);
    container.appendChild(ac);

function renderDonut(values, total) {
  const cx = 60, cy = 60, r = 48, inner = 28;
  let angle = -Math.PI / 2;
  let paths = '';
  values.forEach((v, i) => {
    if (v === 0) return;
    const sweep = (v / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    angle += sweep;
    const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
    const xi1 = cx + inner * Math.cos(angle), yi1 = cy + inner * Math.sin(angle);
    const xi2 = cx + inner * Math.cos(angle - sweep), yi2 = cy + inner * Math.sin(angle - sweep);
    const large = sweep > Math.PI ? 1 : 0;
    paths += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi1.toFixed(1)},${yi1.toFixed(1)} A${inner},${inner} 0 ${large},0 ${xi2.toFixed(1)},${yi2.toFixed(1)} Z" fill="${CATS[i].color}" opacity="0.9"/>`;
  });
  document.getElementById('donutSvg').innerHTML = paths;
  document.getElementById('catLegend').innerHTML = CATS.map((c, i) => {
    if (values[i] === 0) return '';
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${c.color}"></div>
      <div class="legend-label">${c.name}</div>
      <div class="legend-amt">NT$${Math.round(values[i]).toLocaleString()}</div>
      <div class="legend-val">${Math.round(values[i] / total * 100)}%</div>
    </div>`;
  }).join('');
}

// ── Records ──
function renderRecords(data) {
  const el = document.getElementById('recordsList');
  if (!data.length) { el.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--text-muted)">尚無記帳資料</div>'; return; }
  el.innerHTML = [...data].reverse().map(r => {
    const twd = Math.round(toTWD(r.amount, r.currency));
    const symMap = { JPY:'¥', TWD:'NT$', USD:'US$' };
    const symbol = symMap[r.currency] || r.currency + ' ';
    const showTWD = r.currency !== 'TWD';
    return `<div class="record-item">
      <div class="record-cat-icon">${CAT_ICONS[r.category] || '📦'}</div>
      <div class="record-main">

        ${r.items ? `<div style="font-size:0.813rem;color:var(--text-muted);margin-top:2px">${r.items}</div>` : ''}
      </div>

        ${showTWD ? `<div class="record-twd">≈ NT$${twd.toLocaleString()}</div>` : ''}
        ${r.currency === 'JPY' && r.amount >= 5000 ? `<div style="font-size:0.813rem;color:#6A3E00;background:#FFD87A;border-radius:6px;padding:3px 8px;margin-top:3px;display:inline-block;font-weight:500">可退稅</div>` : ''}
      </div>

  }).join('');
}

// ── Modal ──
let currentFile = null, currentCurrency = 'JPY', currentCategory = '餐飲';

function openModal() {
  document.getElementById('modalBackdrop').classList.add('show');
  goStep(1);
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  resetForm();
}
function backdropClick(e) { if (e.target === document.getElementById('modalBackdrop')) closeModal(); }
function goStep(n) {
  document.querySelectorAll('.modal-step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  document.getElementById('modalTitle').textContent = n === 1 ? '📸 上傳收據' : '✅ 確認明細';
}

function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  currentFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('previewImg').src = url;
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('btnAnalyze').disabled = false;
}
function clearFile() {
  currentFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('btnAnalyze').disabled = true;
}

function resizeImage(file, maxSize = 800) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale; canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.82).split(',')[1]);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

async function analyzeReceipt() {
  if (!currentFile) return;
  if (ANTHROPIC_API_KEY === 'YOUR_API_KEY_HERE') {
    showToast('請先填入 API Key，顯示空白表單', true);
    fillForm({ location:'', description:'', amount:'', currency:'JPY', category:'餐飲' });
    return;
  }
  showLoading('解析收據中，請稍候…');
  try {
    const b64 = await resizeImage(currentFile);
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:400, messages:[{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
        { type:'text', text:`解析這張收據，只回傳 JSON，不要其他文字：{"location":"店名（原文）","description":"整體說明（中文，例如：購物、午餐）","amount":數字（最終合計，取含稅後金額）,"currency":"JPY或TWD或USD","category":"根據店家性質判斷：餐廳/食堂/便利商店內用→餐飲；松本清/ドラッグストア/藥局→藥妝；甜點店/冰淇淋/蛋糕→甜點；一般購物/超市/百貨→購物；計程車/電車/巴士→交通；水族館/觀光景點/門票→觀光；其他→其他","items":"品項明細，每個品項格式為 品名×金額，用逗號分隔，忽略條碼數字行，若無法辨識則留空字串"}` }
      ]}]})
    });
    const data = await resp.json();
    const parsed = JSON.parse(data.content?.[0]?.text?.replace(/```json|```/g,'').trim() || '{}');
    fillForm(parsed);
  } catch(e) {
    hideLoading(); showToast('解析失敗，請手動輸入', true);
    fillForm({ location:'', description:'', amount:'', currency:'JPY', category:'餐飲' });
    return;
  }
  hideLoading();
}

function fillForm(d) {
  document.getElementById('fLocation').value = d.location || '';
  document.getElementById('fDescription').value = d.description || '';
  document.getElementById('fAmount').value = d.amount || '';
  document.getElementById('fItems').value = d.items || '';
  setCurrency(d.currency === 'TWD' ? 'TWD' : 'JPY');
  const cat = ['餐飲','交通','購物','觀光','藥妝','甜點','其他'].includes(d.category) ? d.category : '餐飲';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  currentCategory = cat;
  goStep(2);

function setCurrency(c) {
  currentCurrency = c;
  document.getElementById('btnJPY').classList.toggle('active', c === 'JPY');
  document.getElementById('btnTWD').classList.toggle('active', c === 'TWD');
}
function setCategory(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.cat;
}

async function saveRecord() {
  const amount = parseFloat(document.getElementById('fAmount').value);
  if (!amount || amount <= 0) { showToast('請輸入金額', true); return; }
  const record = {
    date: document.getElementById('fDate').value,
    time: new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),
    location: document.getElementById('fLocation').value.trim(),
    description: document.getElementById('fDescription').value.trim(),
    amount, currency: currentCurrency, category: currentCategory,
    items: document.getElementById('fItems').value.trim(),
    note: document.getElementById('fNote').value.trim()
  };
  document.getElementById('btnSave').disabled = true;
  showLoading('儲存中…');
  try {
    await fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(record) });
    hideLoading(); showToast('✅ 儲存成功！');
    closeModal();
  } catch(e) {
    hideLoading(); showToast('儲存失敗，請再試', true);
    document.getElementById('btnSave').disabled = false;
  }
}

function resetForm() {
  clearFile();
  ['fLocation','fDescription','fAmount','fItems','fNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').selectedIndex = 0;
  setCurrency('JPY');
  document.querySelectorAll('.cat-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  currentCategory = '餐飲';
  document.getElementById('btnSave').disabled = false;
}

function showLoading(msg) { document.getElementById('loadingText').textContent = msg; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
let _tt;
function showToast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (err?' error':'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2800);
}

// ── Init ──
// ── 格式正規化 ──────────────────────────────────────────
function normalizeDate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // 令和: R07.06.30 or 令和7年06月30日
  let m = s.match(/[Rr令和]\s*(\d{1,2})[年.\-\/](\d{1,2})[月.\-\/](\d{1,2})/);
  if (m) return `${parseInt(m[2])}/${m[3].padStart(2,'0')}`;
  // 西元 2026.06.30 / 2026-06-30 / 2026/06/30
  m = s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return `${parseInt(m[2])}/${m[3].padStart(2,'0')}`;
  // 已是 6/30 或 7/01
  m = s.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (m) return `${parseInt(m[1])}/${m[2].padStart(2,'0')}`;
  // ISO from GAS
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
  if (m) return `${parseInt(m[2])}/${m[3]}`;
  return s;
}

function normalizeCurrency(raw) {
  if (!raw) return 'JPY';
  const s = String(raw).trim();
  const map = {
    'JPY':'JPY','jpy':'JPY','日幣':'JPY','日圓':'JPY','円':'JPY','¥':'JPY',
    'TWD':'TWD','twd':'TWD','台幣':'TWD','新台幣':'TWD','NT':'TWD','nt':'TWD','NTD':'TWD','ntd':'TWD',
    'USD':'USD','usd':'USD','美金':'USD','美元':'USD','US$':'USD',
  };
  return map[s] || map[s.toLowerCase()] || s.toUpperCase();
}

// ── Font size (shared with index) ──
(function() {
  const map = { s: '15px', m: '17px', l: '20px' };
  const saved = localStorage.getItem('okinawa-font-size') || 'm';
  document.documentElement.style.fontSize = map[saved];
})();

async function init() {
  try {
    const resp = await fetch(GAS_URL);
    const json = await resp.json();
    const data = (json.data || []).map(r => ({
      date: normalizeDate(r['日期']),
      time: r['時間'] || '',
      location: r['地點'] || '',
      desc: r['說明'] || '',
      amount: parseFloat(r['金額']) || 0,
      currency: normalizeCurrency(r['幣別']),
      category: r['類別'] || '其他',
      items: r['品項明細'] || '',
      note: r['備註'] || '',
    })).filter(r => r.amount > 0);
    renderStats(data);
    renderRecords(data);
  } catch(e) {
    renderStats([]);
    renderRecords([]);
    showToast('載入資料失敗，請重新整理', true);
  }
}
init();
